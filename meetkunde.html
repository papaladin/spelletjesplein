<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📐 Vormen & Hoeken – meetkunde voor groep 5</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #c8e8ff 0%, #a0d0f0 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Fredoka One', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 750px;
            width: 100%;
            background: #fffef7;
            border-radius: 70px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 12px #ffcd00, 0 0 0 16px #2c2b26;
            padding: 25px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            background: #ffcd00;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 60px;
            color: #2d2b20;
            margin-bottom: 15px;
            box-shadow: 0 6px 0 #b47c00;
        }

        .shape-canvas {
            background: white;
            border-radius: 40px;
            margin: 15px auto;
            display: block;
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: bold;
            background: #fef3cf;
            padding: 15px;
            border-radius: 50px;
            margin: 15px 0;
        }

        .answers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .answer-btn {
            background: #3f6792;
            font-size: 1.3rem;
            padding: 12px 25px;
            min-width: 140px;
            box-shadow: 0 5px 0 #1f3b55;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.05s linear;
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f3b55;
        }

        .answer-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .feedback {
            font-size: 1.3rem;
            margin: 15px;
            padding: 10px;
            border-radius: 40px;
            background: white;
        }

        .score-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .score-box {
            font-size: 1.2rem;
            font-weight: bold;
            background: #2c2b26;
            color: white;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
        }

        button {
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            padding: 8px 20px;
            font-size: 1rem;
            box-shadow: 0 4px 0 #141d11;
            transition: 0.05s linear;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #141d11;
        }

        .next-btn {
            background: #2c7a2d;
        }

        .reset-btn {
            background: #ff8c42;
        }

        @media (max-width: 550px) {
            .question-text { font-size: 1.2rem; }
            .answer-btn { font-size: 1rem; padding: 8px 15px; min-width: 100px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>📐 Vormen & hoeken 📐</h1>

    <canvas id="shapeCanvas" width="250" height="250" class="shape-canvas" style="width:100%; max-width:250px; height:auto;"></canvas>

    <div class="question-text" id="questionText">Laden...</div>
    <div class="answers" id="answersContainer"></div>

    <div class="feedback" id="feedbackMsg"></div>

    <div class="score-panel">
        <div class="score-box" id="scoreDisplay">Score: 0 / 0</div>
        <div class="score-box" id="questionCounter">Vraag: 0 / 5</div>
        <button id="nextBtn" class="next-btn" disabled>⏩ Volgende vraag</button>
        <button id="resetBtn" class="reset-btn">🔄 Nieuw spel</button>
    </div>
</div>

<script>
    // ----- VOLLEDIGE VRAAGBANK (meer dan 30 vragen) -----
    const allQuestions = [
        // Basis polygonen
        { shape: "square", text: "Hoeveel zijden heeft een vierkant?", options: ["3", "4", "5"], correct: 1 },
        { shape: "square", text: "Hoeveel hoekpunten heeft een vierkant?", options: ["3", "4", "5"], correct: 1 },
        { shape: "rectangle", text: "Hoeveel rechte hoeken heeft een rechthoek?", options: ["2", "3", "4"], correct: 2 },
        { shape: "triangle", text: "Hoeveel zijden heeft een driehoek?", options: ["2", "3", "4"], correct: 1 },
        { shape: "triangle", text: "Hoeveel hoekpunten heeft een driehoek?", options: ["2", "3", "4"], correct: 1 },
        { shape: "pentagon", text: "Hoeveel zijden heeft een vijfhoek?", options: ["4", "5", "6"], correct: 1 },
        { shape: "pentagon", text: "Hoeveel hoekpunten heeft een vijfhoek?", options: ["4", "5", "6"], correct: 1 },
        { shape: "hexagon", text: "Hoeveel zijden heeft een zeshoek?", options: ["5", "6", "7"], correct: 1 },
        { shape: "hexagon", text: "Hoeveel hoekpunten heeft een zeshoek?", options: ["5", "6", "7"], correct: 1 },
        { shape: "heptagon", text: "Hoeveel zijden heeft een zevenhoek?", options: ["6", "7", "8"], correct: 1 },
        { shape: "heptagon", text: "Hoeveel hoekpunten heeft een zevenhoek?", options: ["6", "7", "8"], correct: 1 },
        { shape: "octagon", text: "Hoeveel zijden heeft een achthoek?", options: ["7", "8", "9"], correct: 1 },
        { shape: "octagon", text: "Hoeveel hoekpunten heeft een achthoek?", options: ["7", "8", "9"], correct: 1 },
        { shape: "decagon", text: "Hoeveel zijden heeft een tienhoek?", options: ["9", "10", "12"], correct: 1 },
        { shape: "decagon", text: "Hoeveel hoekpunten heeft een tienhoek?", options: ["9", "10", "12"], correct: 1 },
        // Hoektypes
        { shape: "right_triangle", text: "Hoeveel rechte hoeken heeft deze driehoek?", options: ["0", "1", "2"], correct: 1 },
        { shape: "acute_angle", text: "Wat voor soort hoek is dit?", options: ["Rechte hoek", "Kleine hoek (scherp)", "Grote hoek (stomp)"], correct: 1 },
        { shape: "obtuse_angle", text: "Wat voor soort hoek is dit?", options: ["Rechte hoek", "Kleine hoek (scherp)", "Grote hoek (stomp)"], correct: 2 },
        { shape: "right_angle_only", text: "Wat voor soort hoek is dit?", options: ["Rechte hoek", "Kleine hoek (scherp)", "Grote hoek (stomp)"], correct: 0 },
        { shape: "square", text: "Hoe worden de rechte lijnen van een vierkant genoemd?", options: ["Zijden", "Hoeken", "Punten"], correct: 0 },
        { shape: "rectangle", text: "Wat is een ander woord voor 'hoekpunt'?", options: ["Zijde", "Vertex", "Rand"], correct: 1 },
        { shape: "circle", text: "Hoeveel zijden heeft een cirkel?", options: ["0", "1", "Oneindig veel"], correct: 0 },
        { shape: "circle", text: "Hoeveel hoekpunten heeft een cirkel?", options: ["0", "1", "2"], correct: 0 },
        { shape: "right_angle_shape", text: "Deze vorm heeft een rechte hoek. Hoe herken je een rechte hoek?", options: ["Precies 90 graden", "Minder dan 90 graden", "Meer dan 90 graden"], correct: 0 },
        { shape: "triangle", text: "Wat is de naam van deze vorm?", options: ["Vierkant", "Driehoek", "Rechthoek"], correct: 1 },
        { shape: "rectangle", text: "Wat is de naam van deze vorm?", options: ["Vierkant", "Driehoek", "Rechthoek"], correct: 2 },
        { shape: "square", text: "Een vierkant is een bijzondere ...", options: ["Rechthoek", "Driehoek", "Cirkel"], correct: 0 },
        { shape: "pentagon", text: "Wat is de naam van deze vorm?", options: ["Vierhoek", "Vijfhoek", "Zeshoek"], correct: 1 },
        { shape: "hexagon", text: "Wat is de naam van deze vorm?", options: ["Vijfhoek", "Zeshoek", "Achthoek"], correct: 1 },
        { shape: "octagon", text: "Wat is de naam van deze vorm?", options: ["Zeshoek", "Zevenhoek", "Achthoek"], correct: 2 },
        { shape: "acute_angle", text: "Een hoek die kleiner is dan 90 graden noemen we ...", options: ["Rechte hoek", "Kleine hoek (scherp)", "Grote hoek (stomp)"], correct: 1 },
        { shape: "obtuse_angle", text: "Een hoek die groter is dan 90 graden heet ...", options: ["Rechte hoek", "Kleine hoek (scherp)", "Grote hoek (stomp)"], correct: 2 }
    ];

    // ----- TEKEN FUNCTIES VOOR VORMEN (onaangepast) -----
    const canvas = document.getElementById("shapeCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 250;
    canvas.height = 250;

    function drawSquare() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.fillRect(50,50,150,150); ctx.strokeRect(50,50,150,150); }
    function drawRectangle() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.fillRect(40,70,170,110); ctx.strokeRect(40,70,170,110); }
    function drawTriangle() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); ctx.moveTo(125,40); ctx.lineTo(60,190); ctx.lineTo(190,190); ctx.fill(); ctx.beginPath(); ctx.moveTo(125,40); ctx.lineTo(60,190); ctx.lineTo(190,190); ctx.closePath(); ctx.stroke(); }
    function drawPentagon() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); let cx=125,cy=125,r=80; for(let i=0;i<5;i++){ let a=(i*72-90)*Math.PI/180; let x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.closePath(); ctx.fill(); ctx.stroke(); }
    function drawHexagon() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); let cx=125,cy=125,r=80; for(let i=0;i<6;i++){ let a=(i*60-90)*Math.PI/180; let x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.closePath(); ctx.fill(); ctx.stroke(); }
    function drawHeptagon() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); let cx=125,cy=125,r=80; for(let i=0;i<7;i++){ let a=(i*360/7-90)*Math.PI/180; let x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.closePath(); ctx.fill(); ctx.stroke(); }
    function drawOctagon() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); let cx=125,cy=125,r=80; for(let i=0;i<8;i++){ let a=(i*45-90)*Math.PI/180; let x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.closePath(); ctx.fill(); ctx.stroke(); }
    function drawDecagon() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); let cx=125,cy=125,r=80; for(let i=0;i<10;i++){ let a=(i*36-90)*Math.PI/180; let x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.closePath(); ctx.fill(); ctx.stroke(); }
    function drawCircle() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); ctx.arc(125,125,80,0,2*Math.PI); ctx.fill(); ctx.stroke(); }
    function drawRightTriangle() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); ctx.moveTo(50,190); ctx.lineTo(50,60); ctx.lineTo(190,190); ctx.fill(); ctx.beginPath(); ctx.moveTo(50,190); ctx.lineTo(50,60); ctx.lineTo(190,190); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(50,80); ctx.lineTo(70,80); ctx.lineTo(70,100); ctx.stroke(); }
    function drawRightAngleOnly() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); ctx.moveTo(50,180); ctx.lineTo(50,70); ctx.lineTo(90,70); ctx.lineTo(90,140); ctx.lineTo(180,140); ctx.lineTo(180,180); ctx.fill(); ctx.beginPath(); ctx.moveTo(50,180); ctx.lineTo(50,70); ctx.lineTo(90,70); ctx.lineTo(90,140); ctx.lineTo(180,140); ctx.lineTo(180,180); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(50,90); ctx.lineTo(70,90); ctx.lineTo(70,110); ctx.stroke(); }
    function drawAcuteAngle() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); ctx.moveTo(70,180); ctx.lineTo(150,80); ctx.lineTo(170,180); ctx.fill(); ctx.beginPath(); ctx.moveTo(70,180); ctx.lineTo(150,80); ctx.lineTo(170,180); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.arc(110,150,30,0.8,1.0); ctx.stroke(); }
    function drawObtuseAngle() { ctx.clearRect(0,0,250,250); ctx.fillStyle="#c8e8ff"; ctx.beginPath(); ctx.moveTo(60,170); ctx.lineTo(140,80); ctx.lineTo(180,180); ctx.fill(); ctx.beginPath(); ctx.moveTo(60,170); ctx.lineTo(140,80); ctx.lineTo(180,180); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.arc(110,140,35,0.9,1.8); ctx.stroke(); }
    function drawRightAngleShape() { drawRightAngleOnly(); }
    const drawFunctions = {
        square: drawSquare, rectangle: drawRectangle, triangle: drawTriangle, pentagon: drawPentagon,
        hexagon: drawHexagon, heptagon: drawHeptagon, octagon: drawOctagon, decagon: drawDecagon,
        circle: drawCircle, right_triangle: drawRightTriangle, right_angle_only: drawRightAngleOnly,
        acute_angle: drawAcuteAngle, obtuse_angle: drawObtuseAngle, right_angle_shape: drawRightAngleShape
    };

    // ----- SPELSTATUS (5 vragen per spel) -----
    let currentGameQuestions = [];   // 5 random vragen
    let currentIndex = 0;
    let currentScore = 0;
    let gameActive = true;           // of de huidige vraag nog open is (nog niet geantwoord)
    let finished = false;            // of alle 5 vragen zijn behandeld
    let currentQuestionObj = null;

    const questionTextDiv = document.getElementById("questionText");
    const answersContainer = document.getElementById("answersContainer");
    const feedbackDiv = document.getElementById("feedbackMsg");
    const scoreDisplaySpan = document.getElementById("scoreDisplay");
    const questionCounterSpan = document.getElementById("questionCounter");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    // Kies 5 verschillende willekeurige vragen uit de bank
    function selectRandomQuestions() {
        const shuffled = [...allQuestions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 5);
    }

    // laad de huidige vraag (index currentIndex) in de interface
    function loadCurrentQuestion() {
        if (currentIndex >= currentGameQuestions.length) {
            finished = true;
            gameActive = false;
            questionTextDiv.innerText = "Spel afgerond!";
            answersContainer.innerHTML = "";
            feedbackDiv.innerHTML = `🎉 Jouw score: ${currentScore} / 5 🎉`;
            feedbackDiv.style.background = "#b5e3b5";
            nextBtn.disabled = true;
            return;
        }
        currentQuestionObj = currentGameQuestions[currentIndex];
        // teken de bijbehorende vorm
        const drawFunc = drawFunctions[currentQuestionObj.shape];
        if (drawFunc) drawFunc();
        else drawSquare();
        questionTextDiv.innerText = currentQuestionObj.text;
        // maak antwoordknoppen
        answersContainer.innerHTML = "";
        currentQuestionObj.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.classList.add("answer-btn");
            btn.addEventListener("click", () => checkAnswer(idx));
            answersContainer.appendChild(btn);
        });
        feedbackDiv.innerHTML = "Kies het juiste antwoord!";
        feedbackDiv.style.background = "white";
        gameActive = true;
        nextBtn.disabled = true; // volgende pas na antwoord
        // update tellers
        scoreDisplaySpan.innerText = `Score: ${currentScore} / 5`;
        questionCounterSpan.innerText = `Vraag: ${currentIndex+1} / 5`;
    }

    // antwoord controleren
    function checkAnswer(selectedIdx) {
        if (!gameActive || finished) return;
        if (selectedIdx === currentQuestionObj.correct) {
            currentScore++;
            feedbackDiv.innerHTML = "✅ Helemaal goed! ✅";
            feedbackDiv.style.background = "#b5e3b5";
        } else {
            let correctAnswer = currentQuestionObj.options[currentQuestionObj.correct];
            feedbackDiv.innerHTML = `❌ Helaas, het juiste antwoord is: ${correctAnswer}. ❌`;
            feedbackDiv.style.background = "#ffe0cc";
        }
        // antwoordknoppen uitschakelen
        document.querySelectorAll(".answer-btn").forEach(btn => {
            btn.disabled = true;
        });
        gameActive = false;
        nextBtn.disabled = false; // volgende vraag kan nu
        scoreDisplaySpan.innerText = `Score: ${currentScore} / 5`;
    }

    // ga naar de volgende vraag (of einde)
    function nextQuestion() {
        if (finished) return;
        if (gameActive) {
            feedbackDiv.innerHTML = "Beantwoord eerst de vraag voordat je verder gaat!";
            return;
        }
        currentIndex++;
        if (currentIndex < currentGameQuestions.length) {
            loadCurrentQuestion();
        } else {
            finished = true;
            loadCurrentQuestion(); // toont einde
        }
    }

    // reset spel: nieuwe 5 vragen, score 0, index 0
    function resetGame() {
        currentGameQuestions = selectRandomQuestions();
        currentIndex = 0;
        currentScore = 0;
        finished = false;
        gameActive = true;
        loadCurrentQuestion();
        nextBtn.disabled = true;
        // zorg dat eventueel nog actieve antwoordknoppen weg zijn
        feedbackDiv.style.background = "white";
    }

    nextBtn.addEventListener("click", nextQuestion);
    resetBtn.addEventListener("click", resetGame);

    // start het spel
    resetGame();
</script>
</body>
</html>
